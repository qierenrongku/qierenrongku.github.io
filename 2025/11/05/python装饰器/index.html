            <h2 id="不带参数的装饰器"><a href="#不带参数的装饰器" class="headerlink" title="不带参数的装饰器"></a>不带参数的装饰器</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line">def dolog(func):</span><br><span class="line">    def wrapper(*args, **kwargs):</span><br><span class="line">        print(f&quot;Calling function &#x27;&#123;func.__name__&#125;&#x27; with arguments &#123;args&#125; and &#123;kwargs&#125;&quot;)</span><br><span class="line">        result = func(*args, **kwargs)</span><br><span class="line">        print(f&quot;Function &#x27;&#123;func.__name__&#125;&#x27; returned &#123;result&#125;&quot;)</span><br><span class="line">        return result</span><br><span class="line">    return wrapper</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"># dolog(func)(a, b)</span><br><span class="line"></span><br><span class="line">@dolog</span><br><span class="line">def func(a , b):</span><br><span class="line">    return a + b</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">print(func(2, 3))</span><br><span class="line"></span><br><span class="line">Calling function &#x27;func&#x27; with arguments (2, 3) and &#123;&#125;</span><br><span class="line">Function &#x27;func&#x27; returned 5</span><br><span class="line">5</span><br><span class="line"></span><br></pre></td></tr></table></figure>


<h2 id="带参数的装饰器"><a href="#带参数的装饰器" class="headerlink" title="带参数的装饰器"></a>带参数的装饰器</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br></pre></td><td class="code"><pre><span class="line">def dolog(returns=False):</span><br><span class="line">    def decorator(func):</span><br><span class="line">        def wrapper(*args, **kwargs):</span><br><span class="line">            result = func(*args, **kwargs)</span><br><span class="line">            print(f&quot;Function &#x27;&#123;func.__name__&#125;&#x27; called with args: &#123;args&#125;, kwargs: &#123;kwargs&#125;&quot;)</span><br><span class="line">            if returns:</span><br><span class="line">                print(f&quot;Function &#x27;&#123;func.__name__&#125;&#x27; returned: &#123;result&#125;&quot;)</span><br><span class="line">            return result</span><br><span class="line">        return wrapper</span><br><span class="line">    return decorator</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"># dolog(returns=True)(func)(a, b)</span><br><span class="line"></span><br><span class="line">@dolog(returns=False)</span><br><span class="line">def func(a , b):</span><br><span class="line">    return a + b</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">print(func(2, 3))</span><br><span class="line"></span><br></pre></td></tr></table></figure>
